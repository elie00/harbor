name: src-tauri

on:
  push:
    paths:
      - "src-tauri/**"
      - ".github/workflows/src-tauri.yml"
  pull_request:
    paths:
      - "src-tauri/**"
      - ".github/workflows/src-tauri.yml"

jobs:
  lint-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            libmpv-dev \
            libgtk-3-dev

      - name: Install Mac deps
        if: contains(matrix.os, 'macos')
        run: |
          brew install mpv pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix mpv)/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      # tauri's generate_context! embeds ../dist at compile time, so the frontend
      # must be built before cargo can check/clippy/test the src-tauri crate.
      - name: Build frontend (creates ../dist)
        run: pnpm build

      - name: clippy + test
        working-directory: src-tauri
        run: |
          # Strict : toute nouvelle warning clippy casse la CI (0 warning à ce jour).
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets
